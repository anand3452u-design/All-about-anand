<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "primary-fixed": "#ffd9e2",

                        "tertiary-fixed-dim": "#fdb1cf",

                    "spacing": {
                        "xs": "4px",
                        "lg": "48px",
                        "base": "8px",
                        "md": "24px",
                        "sm": "12px",
                        "xl": "80px",
                        "container-max": "600px"
                    },
                    "fontFamily": {
                        "label-sm": ["Plus Jakarta Sans"],
                        "headline-lg": ["Epilogue"],
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-xl": ["Epilogue"]

                    "fontSize": {
                        "label-sm": ["14px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "500"}],
                        "headline-xl": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neomorph-pill {
            box-shadow: 8px 8px 16px rgba(255, 77, 148, 0.15), -8px -8px 16px rgba(255, 255, 255, 0.8);
        }
        .neomorph-pill:active {
            box-shadow: inset 4px 4px 8px rgba(255, 77, 148, 0.1), inset -4px -4px 8px rgba(255, 255, 255, 0.5);
        }
        .floating-heart {
            position: absolute;
            pointer-events: none;
            opacity: 0.6;
            animation: float-up 6s infinite ease-in-out;
        }
        @keyframes float-up {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<header class="bg-white/90 dark:bg-pink-950/90 backdrop-blur-md flex justify-between items-center w-full px-6 py-4 fixed top-0 z-50 border-b border-pink-100/50 dark:border-pink-900/50 shadow-[0_10px_40px_-15px_rgba(255,77_148,0.3)] rounded-b-[2rem]">
<div class="text-2xl font-black text-pink-600 dark:text-pink-400 italic font-headline-lg">Birthday Love</div>
<div class="flex gap-4">
<button class="text-pink-500 dark:text-pink-300 hover:scale-105 transition-transform duration-300 active:scale-95">
<span class="material-symbols-outlined" data-icon="favorite">favorite</span>
</button>
<button class="text-pink-500 dark:text-pink-300 hover:scale-105 transition-transform duration-300 active:scale-95">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4 pt-24 pb-32 relative">
<div class="absolute inset-0 overflow-hidden -z-10">
<span class="material-symbols-outlined floating-heart text-primary-container" style="left: 10%; bottom: -50px; font-size: 24px; animation-delay: 0s;">favorite</span>
<span class="material-symbols-outlined floating-heart text-secondary-container" style="left: 25%; bottom: -50px; font-size: 40px; animation-delay: 2s;">favorite</span>
<span class="material-symbols-outlined floating-heart text-tertiary-container" style="left: 45%; bottom: -50px; font-size: 18px; animation-delay: 1s;">favorite</span>
<span class="material-symbols-outlined floating-heart text-primary-container" style="left: 70%; bottom: -50px; font-size: 32px; animation-delay: 4s;">favorite</span>
<span class="material-symbols-outlined floating-heart text-secondary-container" style="left: 85%; bottom: -50px; font-size: 22px; animation-delay: 3s;">favorite</span>
</div>
<div class="w-full max-w-container-max flex flex-col items-center text-center gap-md">
<div class="relative w-48 h-48 mb-4">
<div class="absolute inset-0 bg-primary-container/20 rounded-full blur-3xl"></div>
<img alt="A cute teddy bear holding a giant red heart with sparkles" class="w-full h-full object-cover rounded-full border-8 border-white shadow-xl relative z-10" data-alt="ultra-cute fluffy white teddy bear sitting down and hugging a large plush red heart, soft warm cinematic lighting, pastel background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqbcXi_UPn2q2DIZKnz-X425WFj4N1qBmRDoCcv12UpN87d_NkusUn_up5US9yVzWN5r2kCkvI-UetcpQ8k0GHqXCiKDM77LB1A3ezroU9FQJqC82Vsnz-t0ox44j7mgUx5eRN6vP372uh089E4Iuss-yP2mlGHKplAW4jesW9sVkko0h4p4KD9nVMpluwjlyDT4nFRs660SgNfShleQbHQAAmbwvnkJ9zNxFcqJboItT99Rfb-8qrrmOpSffoL270Dr2HfdaoFDk"/>
</div>
<div class="space-y-sm">
<div class="inline-block px-4 py-1 bg-surface-container text-secondary font-label-sm rounded-full mb-2">Birthday Special</div>
<h1 class="font-headline-xl text-primary text-center leading-tight drop-shadow-sm">Do you love me???</h1>
<p class="font-body-md text-on-surface-variant max-w-xs mx-auto">This is the most important question of the day! Please answer truthfully... ❤️</p>
</div>
<div class="flex flex-col sm:flex-row items-center justify-center gap-md mt-lg w-full">
<button class="group relative flex items-center justify-center min-w-[180px] bg-gradient-to-br from-primary-container to-secondary py-6 px-12 rounded-full neomorph-pill transition-all duration-300 hover:scale-110 active:scale-95 overflow-hidden">
<span class="relative z-10 font-headline-lg text-white tracking-wide">Yes</span>
<span class="absolute right-4 opacity-0 group-hover:opacity-100 transition-opacity material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
<button class="min-w-[140px] bg-surface-container-highest text-on-surface-variant font-headline-lg py-4 px-8 rounded-full border-2 border-transparent hover:border-outline-variant transition-all duration-300 hover:scale-105 active:scale-95 grayscale hover:grayscale-0 opacity-80 hover:opacity-100">
                    No
                </button>
</div>
<div class="mt-xl flex flex-wrap justify-center gap-sm">
<span class="px-4 py-2 bg-surface-container text-primary font-label-sm rounded-full flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">star</span> Hopes
                </span>
<span class="px-4 py-2 bg-surface-container text-primary font-label-sm rounded-full flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">favorite</span> Wishes
                </span>
<span class="px-4 py-2 bg-surface-container text-primary font-label-sm rounded-full flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">auto_stories</span> Memories
                </span>
</div>
</div>
</main>
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/95 dark:bg-pink-950/95 docked full-width bottom-0 rounded-t-[2.5rem] border-t border-pink-50 dark:border-pink-900 shadow-[0_-10px_40px_-15px_rgba(255,77,148,0.2)]">
<a class="flex flex-col items-center justify-center text-pink-300 dark:text-pink-700 px-4 py-2 hover:text-pink-500 dark:hover:text-pink-300 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span class="font-epilogue text-[10px] font-bold uppercase tracking-widest mt-1">Journey</span>
</a>
<a class="flex flex-col items-center justify-center bg-pink-50 dark:bg-pink-900/40 text-pink-600 dark:text-pink-200 rounded-full px-5 py-2 scale-110 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-epilogue text-[10px] font-bold uppercase tracking-widest mt-1">The Wish</span>
</a>
<a class="flex flex-col items-center justify-center text-pink-300 dark:text-pink-700 px-4 py-2 hover:text-pink-500 dark:hover:text-pink-300 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
<span class="font-epilogue text-[10px] font-bold uppercase tracking-widest mt-1">Memories</span>
</a>
</nav>
</body></html>
