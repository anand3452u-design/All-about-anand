<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jyotsana's Magical 19th ✨</title>
    <style>
        :root {
            --pink: #ff4d94;
            --light-pink: #ff85a1;
            --gold: #ffd700;
            --dark: #2d3436;
        }

        body {
            margin: 0;
            background: #fff0f5;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            color: var(--dark);
        }

        /* Animated Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 2s ease;
        }

        h1 {
            font-size: 4rem;
            color: var(--pink);
            text-shadow: 3px 3px 0px white, 5px 5px 0px var(--light-pink);
            margin: 0;
        }

        .age-pill {
            background: var(--pink);
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.5rem;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(255, 77, 148, 0.3);
        }

        /* 1. Virtual Cake Game */
        .cake-section {
            padding: 100px 0;
        }

        .cake {
            position: relative;
            width: 200px;
            height: 150px;
            background: #fbdada;
            margin: 50px auto;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 10px 0 #f1a5a5;
        }

        .candle {
            width: 15px;
            height: 50px;
            background: var(--gold);
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 5px;
            cursor: pointer;
        }

        .flame {
            width: 15px;
            height: 25px;
            background: orange;
            position: absolute;
            top: -20px;
            border-radius: 50% 50% 20% 20%;
            animation: flicker 0.1s infinite;
        }
